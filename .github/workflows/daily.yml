name: daily-brief
# 北京白天每小时跑一次（UTC 0–12 点 = 北京 8–20 点），抓到新通知就立即更新、否则不提交。
on:
  schedule:
    - cron: '0 0-12 * * *'
  workflow_dispatch: {}        # 也可在 Actions 页面手动点 Run 立即跑

permissions:
  contents: write              # 允许把生成的网页提交回仓库

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: 生成简报
        run: python daily_brief.py
      - name: 提交网页
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "update brief $(date -u +%F)" || echo "no changes"
          git push
