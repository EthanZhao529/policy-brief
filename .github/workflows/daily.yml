name: daily-brief
# 机械抓取层：每天北京时间 08:30 自动跑（UTC 00:30 = 北京 08:30）先把南京重大专项列表抓进 items.json，
# 之后由本机「policy-brief-daily-intel」AI任务在北京09:00做亲读校准+研究。抓到新通知就更新、否则不提交。
on:
  schedule:
    - cron: '30 0 * * *'
  workflow_dispatch: {}        # 也可在 Actions 页面手动点 Run 立即跑

permissions:
  contents: write              # 允许把生成的网页提交回仓库

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: 生成简报
        run: python daily_brief.py
      - name: 提交网页
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "update brief $(date -u +%F)" || echo "no changes"
          git push
